{% load static %}
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Servicios Bahía | Profesionales a tu alcance{% endblock %}</title>
    <meta name="description" content="{% block meta_description %}Encontrá electricistas, plomeros, gasistas y más en Bahía Blanca.{% endblock %}">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{% static 'style.css' %}?v=1.0">
    {% block extra_head %}{% endblock %}
</head>
<body>

    <nav>
        <div class="nav-container">
            <a href="{% url 'inicio' %}" class="logo">
                <img src="{% static 'img/logo_horizontal.svg' %}" alt="Servicios Bahía" style="height: 62px;">
            </a>
            <ul class="nav-links">
                <li><a href="{% url 'inicio' %}">Inicio</a></li>
                <li><a href="{% url 'unete' %}" class="btn-unete-nav">Sumate como profesional</a></li>
            </ul>
        </div>
    </nav>

    {% block content %}{% endblock %}

    <footer>
        <p>&copy; 2026 Servicios Bahía - Todos los derechos reservados</p>
    </footer>

</body>
</html>
